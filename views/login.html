<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartBell Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in-up { animation: fadeInUp 0.8s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white font-sans min-h-screen flex">

    <!-- BAGIAN KIRI: Gambar -->
    <div class="hidden md:flex md:w-1/2 bg-blue-900 relative items-center justify-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format&fit=crop" 
             alt="School Hallway" 
             class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-600/90 to-slate-900/90 mix-blend-multiply"></div>
        <div class="relative z-10 text-center px-12 text-white max-w-lg fade-in-up">
            <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-white/10 rounded-2xl backdrop-blur-md border border-white/20 shadow-2xl">
                <i data-lucide="bell-ring" class="w-10 h-10 text-white"></i>
            </div>
            <h2 class="text-4xl font-bold mb-4 tracking-tight">SmartBell System</h2>
            <p class="text-blue-100 text-lg leading-relaxed font-light">
                Kelola jadwal bel sekolah, audio pengumuman, dan perangkat tablet dalam satu dashboard.
            </p>
        </div>
    </div>

    <!-- BAGIAN KANAN: Form Login -->
    <div class="w-full md:w-1/2 flex items-center justify-center p-8 bg-white relative">
        <div class="w-full max-w-md space-y-8 fade-in-up" style="animation-delay: 0.2s;">
            <div class="text-left">
                <h3 class="text-3xl font-bold text-slate-900 mb-2">Selamat Datang 👋</h3>
                <p class="text-slate-500">Silakan masukkan detail akun admin Anda.</p>
            </div>

            <!-- FORM LOGIN: Menggunakan metode POST standar -->
            <form action="/api/login" method="POST" class="space-y-6">
                
                <!-- Alert Error (Ditampilkan jika ada parameter ?error=1 di URL) -->
                <div id="login-error" class="hidden bg-red-50 text-red-600 text-sm p-4 rounded-xl flex items-center gap-3 border border-red-100 animate-pulse">
                    <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
                    <span>Username atau password salah.</span>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                        <div class="relative group">
                            <span class="absolute left-4 top-3.5 text-slate-400 group-focus-within:text-blue-600 transition-colors"><i data-lucide="user" class="w-5 h-5"></i></span>
                            <input type="text" name="username" placeholder="admin" required class="w-full pl-12 pr-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                        <div class="relative group">
                            <span class="absolute left-4 top-3.5 text-slate-400 group-focus-within:text-blue-600 transition-colors"><i data-lucide="lock" class="w-5 h-5"></i></span>
                            <input type="password" name="password" placeholder="••••••••" required class="w-full pl-12 pr-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-xl shadow-blue-600/20 transition-all transform active:scale-[0.99] flex justify-center items-center gap-2 text-lg">
                    Masuk Dashboard <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="pt-6 text-center text-sm text-slate-400">&copy; 2024 SmartBell System v1.0</div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Cek URL parameter untuk menampilkan error
        const urlParams = new URLSearchParams(window.location.search);
        const errorDiv = document.getElementById('login-error');
        const errorMessage = errorDiv.querySelector('span');

        if (urlParams.has('error')) {
            errorDiv.classList.remove('hidden');
            const errCode = urlParams.get('error');
            
            if (errCode === '1') {
                errorMessage.textContent = "Username atau Password salah!";
            } else if (errCode === 'session_missing') {
                errorMessage.textContent = "Browser menolak menyimpan cookie. Coba gunakan Chrome/Edge biasa (bukan Incognito) atau matikan blocker.";
            } else if (errCode === 'session_invalid') {
                errorMessage.textContent = "Sesi kadaluarsa. Silakan login ulang.";
            } else {
                errorMessage.textContent = "Terjadi kesalahan: " + errCode;
            }
        }
    </script>
</body>
</html>
