<!-- REPORTS SECTION -->
<section id="reports" class="page-section">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-800">Laporan Kehadiran</h2>
            <p class="text-slate-500">Generate laporan kehadiran dalam format PDF</p>
        </div>
    </div>

    <!-- Filter Form -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
        <h3 class="text-lg font-semibold mb-4">Filter Laporan</h3>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Report Type -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Tipe Laporan</label>
                <select id="reportPeriodType" onchange="toggleDateInputs()"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="daily">Harian</option>
                    <option value="weekly">Mingguan</option>
                    <option value="monthly">Bulanan</option>
                </select>
            </div>

            <!-- Subject Type -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Subjek</label>
                <select id="reportSubjectType" onchange="toggleClassFilter()"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="student">Siswa</option>
                    <option value="staff">Staff</option>
                </select>
            </div>

            <!-- Class Filter (for students only) -->
            <div id="classFilterDiv">
                <label class="block text-sm font-medium text-slate-700 mb-2">Kelas (Opsional)</label>
                <select id="reportClassFilter"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">Semua Kelas</option>
                    {{range .Classes}}
                    <option value="{{.ID}}">{{.Name}}</option>
                    {{end}}
                </select>
            </div>
        </div>

        <!-- Date Inputs -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
            <!-- Daily Date -->
            <div id="dailyDateDiv">
                <label class="block text-sm font-medium text-slate-700 mb-2">Tanggal</label>
                <input type="date" id="reportDailyDate"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Weekly Start Date -->
            <div id="weeklyStartDiv" class="hidden">
                <label class="block text-sm font-medium text-slate-700 mb-2">Tanggal Mulai</label>
                <input type="date" id="reportWeeklyStart"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Weekly End Date -->
            <div id="weeklyEndDiv" class="hidden">
                <label class="block text-sm font-medium text-slate-700 mb-2">Tanggal Akhir</label>
                <input type="date" id="reportWeeklyEnd"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Monthly Month -->
            <div id="monthlyMonthDiv" class="hidden">
                <label class="block text-sm font-medium text-slate-700 mb-2">Bulan</label>
                <input type="month" id="reportMonthlyMonth"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-3 mt-6">
            <button onclick="generateReport('preview')"
                class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 flex items-center gap-2 transition">
                <i data-lucide="eye" class="w-4 h-4"></i> Preview
            </button>
            <button onclick="generateReport('download')"
                class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2 shadow-lg shadow-blue-600/20 transition">
                <i data-lucide="download" class="w-4 h-4"></i> Download PDF
            </button>
        </div>
    </div>

    <!-- Preview Area -->
    <div id="reportPreview" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 hidden">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">Preview Laporan</h3>
            <button onclick="closePreview()" class="text-slate-500 hover:text-slate-700">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div id="reportPreviewContent" class="overflow-x-auto">
            <!-- Preview content will be loaded here -->
        </div>
    </div>
</section>
